<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Confirmed | Ship Louder</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0a0a0a;
            --bg-card: #111111;
            --border: #1e1e1e;
            --green: #22c55e;
            --green-glow: rgba(34, 197, 94, 0.4);
            --text: #f5f5f5;
            --text-muted: #888888;
            --text-dim: #555555;
            --mono: 'JetBrains Mono', monospace;
            --sans: 'DM Sans', sans-serif;
        }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--sans);
            font-size: 16px;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        nav {
            background: rgba(10, 10, 10, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
        }
        .nav-inner {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 24px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .logo {
            font-family: var(--mono);
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--text);
            text-decoration: none;
        }
        .logo span { color: var(--green); }

        .success-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 24px;
        }

        .success-card {
            background: var(--bg-card);
            border: 1px solid var(--green);
            border-radius: 16px;
            padding: 56px 48px;
            max-width: 600px;
            width: 100%;
            text-align: center;
            box-shadow: 0 0 60px rgba(34, 197, 94, 0.1), 0 0 120px rgba(34, 197, 94, 0.05);
        }

        .success-icon {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: rgba(34, 197, 94, 0.12);
            border: 2px solid var(--green);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: var(--green);
            margin-bottom: 28px;
        }

        .success-card h1 {
            font-family: var(--mono);
            font-size: 1.75rem;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .success-card .sub {
            font-size: 1.05rem;
            color: var(--text-muted);
            margin-bottom: 32px;
            line-height: 1.7;
        }

        /* Form styles */
        .onboarding-form {
            text-align: left;
            margin-bottom: 32px;
        }

        .onboarding-form h3 {
            font-family: var(--mono);
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--green);
            letter-spacing: 0.05em;
            margin-bottom: 20px;
            text-align: center;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-family: var(--mono);
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--text);
            margin-bottom: 8px;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px 16px;
            color: var(--text);
            font-family: var(--sans);
            font-size: 0.9rem;
            line-height: 1.5;
            transition: border-color 0.2s ease;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--green);
            box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.1);
        }

        .form-group input::placeholder,
        .form-group textarea::placeholder {
            color: var(--text-dim);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-family: var(--mono);
            font-size: 0.85rem;
            font-weight: 500;
            padding: 14px 28px;
            border-radius: 6px;
            text-decoration: none;
            cursor: pointer;
            border: none;
            transition: all 0.25s ease;
            background: var(--green);
            color: #000;
        }

        .btn:hover {
            background: #2dd868;
            box-shadow: 0 0 24px var(--green-glow);
            transform: translateY(-1px);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .btn-submit {
            width: 100%;
            justify-content: center;
            padding: 16px;
            font-size: 0.9rem;
        }

        .form-error {
            background: rgba(239, 68, 68, 0.08);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 8px;
            padding: 12px 16px;
            color: #ef4444;
            font-family: var(--mono);
            font-size: 0.8rem;
            text-align: center;
            margin-bottom: 16px;
            display: none;
        }

        /* Confirmation state (hidden initially) */
        .confirmation {
            display: none;
        }

        .btn-ghost {
            background: transparent;
            color: var(--text-muted);
            border: 1px solid var(--border);
        }

        .btn-ghost:hover {
            color: var(--text);
            border-color: #333;
            background: rgba(255, 255, 255, 0.03);
            box-shadow: none;
        }

        .email-note {
            margin-top: 20px;
            font-size: 0.85rem;
            color: var(--text-dim);
        }

        .email-note a {
            color: var(--text-muted);
            text-decoration: underline;
            text-underline-offset: 3px;
        }

        .email-note a:hover { color: var(--text); }

        @media (max-width: 600px) {
            .success-card {
                padding: 40px 24px;
            }
        }
    </style>
</head>
<body>
    <nav>
        <div class="nav-inner">
            <a href="/" class="logo">ship<span>louder</span></a>
        </div>
    </nav>

    <div class="success-wrapper">
        <div class="success-card">
            <div class="success-icon">&#10003;</div>
            <h1>Payment confirmed.</h1>
            <p class="sub">You're in. Tell us about your product so we can start sourcing the right creators.</p>

            <!-- Onboarding form -->
            <div id="form-section" class="onboarding-form">
                <h3>Quick onboarding</h3>
                <form id="onboarding-form">
                    <div class="form-group">
                        <label for="product-url">Link to your product</label>
                        <input type="url" id="product-url" name="product_url" placeholder="https://yourapp.com" required>
                    </div>
                    <div class="form-group">
                        <label for="selling-point">Main selling point</label>
                        <textarea id="selling-point" name="selling_point" placeholder="What makes your product worth talking about?" required></textarea>
                    </div>
                    <div class="form-group">
                        <label for="avoid">Anything you don't want covered?</label>
                        <textarea id="avoid" name="avoid" placeholder="Topics, features, or angles to skip..."></textarea>
                    </div>
                    <div class="form-group">
                        <label for="ideal-customer">Who is your ideal customer?</label>
                        <textarea id="ideal-customer" name="ideal_customer" placeholder="e.g. Solo founders building SaaS, freelance designers..." required></textarea>
                    </div>
                    <div class="form-error" id="form-error"></div>
                    <button type="submit" class="btn btn-submit" id="submit-btn">Submit &rarr;</button>
                </form>
            </div>

            <!-- Confirmation (shown after submit) -->
            <div id="confirmation-section" class="confirmation">
                <h1>Got it. We'll be in touch within 24 hours.</h1>
                <p class="sub">We're matching your product with the right creators now.</p>

                <a href="/" class="btn btn-ghost">Back to Ship Louder</a>
                <p class="email-note">Questions? Email <a href="mailto:hello@shiplouder.com">hello@shiplouder.com</a></p>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('onboarding-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const btn = document.getElementById('submit-btn');
            const errorEl = document.getElementById('form-error');
            btn.disabled = true;
            btn.textContent = 'Sending...';
            errorEl.style.display = 'none';

            const sessionId = new URLSearchParams(window.location.search).get('session_id') || '';

            try {
                const res = await fetch('https://api.web3forms.com/submit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        access_key: '47ddf88c-91b1-49cf-8543-bd62d85f0036',
                        subject: 'New ShipLouder Customer Onboarding',
                        from_name: 'ShipLouder Onboarding Form',
                        product_url: document.getElementById('product-url').value,
                        main_selling_point: document.getElementById('selling-point').value,
                        do_not_cover: document.getElementById('avoid').value || '(none)',
                        ideal_customer: document.getElementById('ideal-customer').value,
                        stripe_session_id: sessionId,
                    }),
                });

                if (!res.ok) throw new Error('Server error');

                document.getElementById('form-section').style.display = 'none';
                document.querySelector('.success-card > .success-icon').style.display = 'none';
                document.querySelector('.success-card > h1').style.display = 'none';
                document.querySelector('.success-card > .sub').style.display = 'none';
                document.getElementById('confirmation-section').style.display = 'block';
            } catch (err) {
                errorEl.textContent = 'Something went wrong. Please try again or email hello@shiplouder.com.';
                errorEl.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Submit \u2192';
            }
        });
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
</body>
</html>
